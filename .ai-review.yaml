llm:
  provider: OPENROUTER
  meta:
    model: deepseek/deepseek-r1:free
    max_tokens: 15000
    temperature: 0.3
  http_client:
    timeout: 120
    api_url: https://openrouter.ai/api/v1
    api_token: ${OPENROUTER_API_KEY}

vcs:
  provider: GITHUB
  http_client:
    api_url: https://api.github.com
    api_token: ${GITHUB_TOKEN}

review:
  mode: FULL_FILE_DIFF
  ignore_changes:
    - "data/databases/**/*.db"
    - "**/*.db"
  
  custom_prompt: |
    Ты — строгий ревьювер Python кода.
    
    Особое внимание обрати на:
    1. Гибридный стек ttk+tk: должны использоваться оба импорта
       - import tkinter as tk
       - from tkinter import ttk
    2. Потокобезопасность: обновления GUI из фона через after()
    3. DI контейнер: зависимости внедряются через DIContainer
    4. SQLite соединения: read-only (?mode=ro)
    
    Если код хорош — кратко похвали.
    Если есть проблемы — укажи файл, строку и предложи исправление.