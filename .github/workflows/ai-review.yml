name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: AI PR Review
        uses: jonit-dev/openrouter-github-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          open_router_key: ${{ secrets.OPENROUTER_API_KEY }}
          model_id: 'deepseek/deepseek-r1:free'
          custom_prompt: |
            Ты — строгий ревьювер Python кода.
            Проверь изменения в этом Pull Request.
            
            Особое внимание обрати на:
            1. Гибридный стек ttk+tk: должны использоваться оба (import tkinter as tk, from tkinter import ttk)
            2. Потокобезопасность: обновления GUI из фона через after()
            3. DI контейнер: зависимости внедряются через DIContainer
            4. SQLite соединения: read-only (?mode=ro)