name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: AI PR Review
        uses: reviewpad/action@v4
        with:
          openai_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          openai_base_url: "https://openrouter.ai/api/v1"
          model: "deepseek/deepseek-r1:free"
          instructions: |
            Ты — строгий, но конструктивный ревьювер Python-кода.
            Проанализируй изменения в этом Pull Request.
            Обрати особое внимание на:
            1. Корректность использования гибридного стека ttk+tk.
            2. Потенциальные проблемы с потоками (обновление GUI из фона).
            3. Следование принципам Dependency Injection (DIContainer).
            4. Безопасность работы с БД (SQL-инъекции, read-only соединения).
            
            Оставь свой отчет в виде комментария к PR.
            Если код хорош, кратко похвали и скажи, что можно мёржить.
            Если есть проблемы, укажи на конкретные файлы и строки и предложи исправления.