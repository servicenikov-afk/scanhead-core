name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Nikita-Filonov/ai-review@v0.67.0
        with:
          review-command: run-summary
        env:
          LLM__PROVIDER: "OPENROUTER"
          LLM__META__MODEL: "deepseek/deepseek-r1:free"
          LLM__META__MAX_TOKENS: "15000"
          LLM__META__TEMPERATURE: "0.3"
          LLM__HTTP_CLIENT__API_URL: "https://openrouter.ai/api/v1"
          LLM__HTTP_CLIENT__API_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}

          VCS__PROVIDER: "GITHUB"
          VCS__PIPELINE__OWNER: ${{ github.repository_owner }}
          VCS__PIPELINE__REPO: ${{ github.event.repository.name }}
          VCS__PIPELINE__PULL_NUMBER: ${{ github.event.pull_request.number }}
          VCS__HTTP_CLIENT__API_URL: "https://api.github.com"
          VCS__HTTP_CLIENT__API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # Принудительно указываем режим
          REVIEW__MODE: "FULL_FILE_DIFF"
          REVIEW__ALLOW_CHANGES: "['gui/**/*.py', 'libs/**/*.py', 'services/**/*.py', 'main.py']"
          
          # Используем custom_prompt из .ai-review.yaml
          REVIEW__CUSTOM_PROMPT_FILE: ".ai-review.yaml"