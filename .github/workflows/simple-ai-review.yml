name: Simple AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install openai PyGithub
      
      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - << 'EOF'
          import os
          from github import Github, Auth
          from openai import OpenAI
          
          # Настройки
          repo_name = os.environ["REPO"]
          pr_number = int(os.environ["PR_NUMBER"])
          github_token = os.environ["GITHUB_TOKEN"]
          openrouter_key = os.environ["OPENROUTER_KEY"]
          
          # Подключаемся к GitHub (новый способ без deprecation warning)
          auth = Auth.Token(github_token)
          g = Github(auth=auth)
          repo = g.get_repo(repo_name)
          pr = repo.get_pull(pr_number)
          
          # Получаем diff
          files = pr.get_files()
          diff_text = ""
          for file in list(files)[:20]:  # Ограничиваем 20 файлами
              diff_text += f"\n--- {file.filename} ---\n"
              if file.patch:
                  # Ограничиваем размер патча
                  patch = file.patch[:3000]
                  diff_text += patch + "\n"
          
          if not diff_text:
              print("No changes found")
              exit(0)
          
          print(f"Analyzing {len(diff_text)} characters of changes...")
          
          # Отправляем в OpenRouter (используем работающую бесплатную модель)
          client = OpenAI(
              base_url="https://openrouter.ai/api/v1",
              api_key=openrouter_key,
          )
          
          prompt = f"""Ты — строгий ревьювер Python кода.
          Проверь следующие изменения в Pull Request #{pr_number}:
          
          {diff_text[:20000]}
          
          Напиши краткий отчёт на русском языке:
          1. Основные изменения (2-3 предложения)
          2. Потенциальные проблемы (если есть) — укажи конкретные файлы
          3. Общая оценка (отлично/хорошо/требует доработок)
          
          Будь конструктивен."""
          
          response = client.chat.completions.create(
              model="google/gemini-2.0-flash-exp:free",  # Работающая бесплатная модель
              messages=[{"role": "user", "content": prompt}],
              max_tokens=1500,
          )
          
          review = response.choices[0].message.content
          
          # Постим комментарий
          pr.create_issue_comment(f"## 🤖 AI Review (Gemini Flash)\n\n{review}\n\n---\n*Проверено через OpenRouter | Модель: google/gemini-2.0-flash-exp:free*")
          print("✅ Review posted successfully!")
          EOF