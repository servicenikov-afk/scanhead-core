name: Simple AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install openai PyGithub
      
      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - << 'EOF'
          import os
          import time
          from github import Github, Auth
          from openai import OpenAI, RateLimitError
          
          # Настройки
          repo_name = os.environ["REPO"]
          pr_number = int(os.environ["PR_NUMBER"])
          github_token = os.environ["GITHUB_TOKEN"]
          openrouter_key = os.environ["OPENROUTER_KEY"]
          
          # Подключаемся к GitHub
          auth = Auth.Token(github_token)
          g = Github(auth=auth)
          repo = g.get_repo(repo_name)
          pr = repo.get_pull(pr_number)
          
          # Получаем diff
          files = pr.get_files()
          diff_text = ""
          file_count = 0
          for file in files:
              if file_count >= 15:
                  break
              diff_text += f"\n--- {file.filename} ---\n"
              if file.patch:
                  patch = file.patch[:2000]
                  diff_text += patch + "\n"
              file_count += 1
          
          if not diff_text:
              print("No changes found")
              exit(0)
          
          print(f"📊 Analyzing {len(diff_text)} characters from {file_count} files...")
          
          # Отправляем в OpenRouter
          client = OpenAI(
              base_url="https://openrouter.ai/api/v1",
              api_key=openrouter_key,
          )
          
          prompt = f"""Ты — строгий ревьювер Python кода.
          Проверь следующие изменения в Pull Request #{pr_number}:
          
          {diff_text[:20000]}
          
          Напиши краткий отчёт на русском языке в формате Markdown:
          ## 📝 Основные изменения
          (2-3 предложения)
          
          ## ⚠️ Потенциальные проблемы
          (если есть — укажи конкретные файлы и строки, предложи исправления. Если проблем нет, напиши "Проблем не обнаружено")
          
          ## ✅ Общая оценка
          (отлично/хорошо/требует доработок)
          
          Будь конструктивен и краток."""
          
          # Список моделей для fallback (от лучшей к запасной)
          models_to_try = [
              "nvidia/nemotron-3-ultra-550b-a55b:free",  # 550B параметров, 1M контекст
              "poolside/laguna-xs.2:free",               # Специализирована для кода
              "qwen/qwen3-coder:free",                   # Qwen3 Coder (может быть rate-limited)
          ]
          
          review = None
          used_model = None
          
          for model in models_to_try:
              print(f"🔄 Пробую модель: {model}")
              try:
                  response = client.chat.completions.create(
                      model=model,
                      messages=[{"role": "user", "content": prompt}],
                      max_tokens=1500,
                      temperature=0.3,
                  )
                  review = response.choices[0].message.content
                  used_model = model
                  print(f"✅ Модель {model} сработала!")
                  break
              except RateLimitError as e:
                  print(f"⚠️  Rate limit для {model}, жду 35 секунд...")
                  time.sleep(35)
                  # Пробуем ещё раз ту же модель
                  try:
                      response = client.chat.completions.create(
                          model=model,
                          messages=[{"role": "user", "content": prompt}],
                          max_tokens=1500,
                          temperature=0.3,
                      )
                      review = response.choices[0].message.content
                      used_model = model
                      print(f"✅ Модель {model} сработала после retry!")
                      break
                  except Exception as retry_error:
                      print(f"❌ Retry не помог для {model}: {retry_error}")
                      continue
              except Exception as e:
                  print(f"❌ Ошибка с моделью {model}: {e}")
                  continue
          
          if not review:
              print("❌ Все модели недоступны!")
              exit(1)
          
          # Постим комментарий
          pr.create_issue_comment(f"## 🤖 AI Review\n\n{review}\n\n---\n*Проверено через OpenRouter | Модель: {used_model}*")
          print(f"✅ Review posted successfully with model: {used_model}")
          EOF